server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/asset_mgm?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: asset-mgm-secret-key-2026-please-change-in-production
  expiration: 86400000  # 24小时

file:
  upload-path: /data/asset-mgm/uploads

springdoc:
  swagger-ui:
    path: /swagger-ui.html
